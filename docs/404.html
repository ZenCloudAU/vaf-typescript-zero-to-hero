<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=./">
<title>Redirecting — TypeScript Zero to Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F1F5F9;--surface:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text-2:#475569;--orange:#E8630A;--orange-subtle:#FFF7ED;--orange-border:#FED7AA;--navy:#1E3A5F}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6}.wrap{max-width:860px;margin:0 auto;padding:6rem 2rem}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2rem}h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,5rem);line-height:.95;margin:0 0 1rem;color:var(--text)}.badge{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;background:var(--orange-subtle);color:var(--orange);border:1px solid var(--orange-border);border-radius:4px;padding:.25rem .45rem;display:inline-block;margin-bottom:1rem}p{color:var(--text-2)}a{color:var(--orange);font-weight:500}
</style>
</head>
<body>
<main class="wrap"><div class="card"><div class="badge">Velocity Architecture Academy</div><h1>Redirecting to the course.</h1><p>If the page does not redirect, <a href="./">open TypeScript Zero to Hero</a>.</p></div></main>
</body>
</html>
